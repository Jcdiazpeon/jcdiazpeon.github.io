02Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== HERO / HOME ===== -->\n  <section id=\"home\" style=\"max-width:1180px;margin:0 auto;padding:80px 56px 64px\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;letter-spacing:.12em;color:#2f6fed;margin-bottom:26px\">01 — PHD RESEARCHER / ROBOTICS &amp; AUTONOMY<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 270px;gap:64px;align-items:center\">\n      <div>\n        <h1 style=\"font-weight:700;font-size:58px;line-height:1.04;letter-spacing:-.03em;margin:0 0 24px\">Morphable, omnidirectional<br>aerial robotics.<\u002Fh1>\n        <p style=\"font-size:17.5px;line-height:1.62;color:#42454c;max-width:620px;margin:0 0 18px\">I'm Jose Diaz, a PhD researcher in the <a href=\"https://vasileiostzoumas.com/\" target=\"_blank\" style=\"font-weight:600;color:#2f6fed\">Intelligent Robotics &amp; Autonomy Lab<\u002Fa> at the University of Michigan, advised by <a href=\"https://vasileiostzoumas.com/\" target=\"_blank\" style=\"font-weight:600;color:#2f6fed\">Prof. Vasileios Tzoumas<\u002Fa>. I design and fly drones with full 6-DoF force and torque control — for agile maneuvering, aerial manipulation, and resilience.<\u002Fp>\n        <p style=\"font-size:17.5px;line-height:1.62;color:#42454c;max-width:620px;margin:0 0 30px\">My work spans the full stack: controls, firmware, simulation, and hardware flight test. M.S. (concentration in Controls &amp; Autonomous Systems) &amp; B.S. in Aerospace Engineering at Michigan, Summa Cum Laude.<\u002Fp>\n        <div style=\"display:flex;border:1px solid #14171c;border-radius:3px;overflow:hidden;width:max-content\">\n          <a href=\"https://scholar.google.com/citations?user=IFyPjEAAAAAJ&amp;hl=en\" target=\"_blank\" style=\"font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;color:#fff;background:#14171c;padding:12px 20px\">Google Scholar<\u002Fa>\n          <a href=\"https://www.linkedin.com/in/jose-diaz-peon/\" target=\"_blank\" style=\"font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;color:#14171c;background:transparent;padding:12px 20px;border-left:1px solid #14171c\">LinkedIn<\u002Fa>\n          <a onclick=\"{{ openEmail }}\" style=\"font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;color:#14171c;background:transparent;padding:12px 20px;border-left:1px solid #14171c;cursor:pointer\">Email<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <img src=\"5622e12b-35aa-44f6-967f-f6061600fdc1\" alt=\"Jose C. Diaz\" style=\"width:270px;height:300px;object-fit:cover;display:block;border:1px solid #14171c\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#85878d;margin-top:10px;line-height:1.7\">LOC: ANN ARBOR, MI<br>{{ emailObf }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- focus tags -->\n    <div style=\"display:flex;gap:0;margin-top:54px;border:1px solid #d9d9d1;background:#fff\">\n      <div style=\"flex:1;padding:22px 26px;border-right:1px solid #d9d9d1\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;color:#2f6fed;margin-bottom:9px\">FOCUS / 01<\u002Fdiv>\n        <div style=\"font-size:15.5px;font-weight:600\">Morphable &amp; omnidirectional flight<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;padding:22px 26px;border-right:1px solid #d9d9d1\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;color:#2f6fed;margin-bottom:9px\">FOCUS / 02<\u002Fdiv>\n        <div style=\"font-size:15.5px;font-weight:600\">Aerial manipulation<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;padding:22px 26px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;color:#2f6fed;margin-bottom:9px\">FOCUS / 03<\u002Fdiv>\n        <div style=\"font-size:15.5px;font-weight:600\">Robust &amp; adaptive control<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== PUBLICATIONS ===== -->\n  <section id=\"publications\" style=\"background:#fff;border-top:1px solid #d9d9d1;border-bottom:1px solid #d9d9d1\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:64px 56px\">\n      <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:34px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;letter-spacing:.12em;color:#5a5d64\">02 — PUBLICATIONS<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#a4a6ac\">2 PAPERS<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- featured: MorphQuad -->\n      <div style=\"display:grid;grid-template-columns:1fr 540px;gap:48px;align-items:start\">\n        <div>\n          <div style=\"display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap\">\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:#2f6fed;background:#eef3fd;border:1px solid #b9cdf6;padding:5px 10px;border-radius:3px\">CO-FIRST AUTHOR<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:#84613a;background:#f6efe3;border:1px solid #e1cfae;padding:5px 10px;border-radius:3px\">UNDER REVIEW<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:#5a5d64;border:1px solid #d9d9d1;padding:5px 10px;border-radius:3px\">U.S. PATENT PENDING<\u002Fspan>\n          <\u002Fdiv>\n          <h2 style=\"font-weight:700;font-size:34px;line-height:1.12;letter-spacing:-.025em;margin:0 0 16px\">MorphQuad: A Morphable Quadrotor for Superhuman Maneuverability, Manipulation, and Resiliency<\u002Fh2>\n          <p style=\"font-size:16.5px;line-height:1.64;color:#42454c;margin:0 0 16px\">A morphable quadrotor that acts as a flying human hand — navigating tight spaces, turning valves, perching, pointing and tracking, pushing and pulling. With full 6-DoF control at any orientation, it stays resilient to winds, physical displacements, and even rotor failures.<\u002Fp>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#85878d;margin-bottom:22px;line-height:1.7\"><strong style=\"color:#14171c;font-weight:600\">J. C. Díaz Peón González Pacheco*<\u002Fstrong>, J. Xu*, A. Zhao*, H. Zhou, A. Navsalkar, A. Scheffer, A. Malli Reddi, S. Shankar, Y. Bao, V. Tzoumas<br><span style=\"color:#a4a6ac\">*equal first-author contribution · iRAL — University of Michigan<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:10px;font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:500;color:#2f6fed\">\n            <a href=\"assets/MorphQuad_Poster.pdf\" target=\"_blank\" style=\"color:#2f6fed\">[ poster ]<\u002Fa>\n            <a href=\"https://iral-morphable.github.io/\" target=\"_blank\" style=\"color:#2f6fed\">[ project page ]<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <image-slot id=\"site-morphquad\" src=\"2b9db72e-8a9b-4cef-be7f-f952ea237046\" style=\"width: 540px; height: 545px; display: block; border: 1px solid #e4e4dd\" shape=\"rect\" placeholder=\"Drop a MorphQuad render / photo\"><\u002Fimage-slot>\n          <div style=\"display:flex;border:1px solid #d9d9d1;border-top:none;background:#fff\">\n            <div style=\"flex:1;padding:14px 14px;border-right:1px solid #d9d9d1\">\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;letter-spacing:.04em;color:#2f6fed;margin-bottom:6px\">MANEUVER<\u002Fdiv>\n              <div style=\"font-size:12.5px;line-height:1.45;color:#42454c\">Traverses tight spaces from any direction.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1;padding:14px 14px;border-right:1px solid #d9d9d1\">\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;letter-spacing:.04em;color:#2f6fed;margin-bottom:6px\">MANIPULATE<\u002Fdiv>\n              <div style=\"font-size:12.5px;line-height:1.45;color:#42454c\">Turns valves, pushes, and presses sensors.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1;padding:14px 14px\">\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;letter-spacing:.04em;color:#2f6fed;margin-bottom:6px\">RESILIENT<\u002Fdiv>\n              <div style=\"font-size:12.5px;line-height:1.45;color:#42454c\">Rejects wind and contact disturbances.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- MorphEUS compact -->\n      <div style=\"display:grid;grid-template-columns:320px 1fr;gap:32px;align-items:start;margin-top:48px;padding-top:40px;border-top:1px solid #e4e4dd\">\n        <image-slot id=\"site-morpheus\" src=\"0efbe327-20a0-466d-91eb-41ce88843636\" style=\"width:320px;height:205px;display:block;border:1px solid #e4e4dd\" shape=\"rect\" placeholder=\"MorphEUS figure\"><\u002Fimage-slot>\n        <div>\n          <div style=\"display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap\">\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:#2f6fed;background:#eef3fd;border:1px solid #b9cdf6;padding:4px 9px;border-radius:3px\">CO-FIRST AUTHOR<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:#2f6fed;border:1px solid #b9cdf6;padding:4px 9px;border-radius:3px\">ICRA 2025 WORKSHOP<\u002Fspan>\n          <\u002Fdiv>\n          <h3 style=\"font-weight:700;font-size:22px;line-height:1.2;letter-spacing:-.02em;margin:0 0 10px\">MorphEUS: A Morphable Omnidirectional Unmanned System<\u002Fh3>\n          <p style=\"font-size:15px;line-height:1.6;color:#42454c;margin:0 0 12px;max-width:720px\">A fully omnidirectional, variable-tilt coaxial quadrotor with independent 6-DoF force/torque control, augmented by an L1-adaptive controller for robustness. Presented at the ICRA 2025 Workshop on Open Challenges in Robotics for Asset Inspection and Management.<\u002Fp>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#85878d;margin-bottom:14px;line-height:1.7\">I. Bao, <strong style=\"color:#14171c;font-weight:600\">J. C. Díaz Peón González Pacheco<\u002Fstrong>, A. Navsalkar, A. Scheffer, S. Shankar, A. Zhao, H. Zhou, V. Tzoumas<br><span style=\"color:#a4a6ac\">All authors contributed equally; listed alphabetically.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:10px;font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:500;color:#2f6fed\">\n            <a href=\"https://arxiv.org/abs/2505.18270\" target=\"_blank\" style=\"color:#2f6fed\">[ arXiv ]<\u002Fa>\n            <a href=\"https://iral-morphable.github.io/\" target=\"_blank\" style=\"color:#2f6fed\">[ project page ]<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== PROJECTS ===== -->\n  <section id=\"projects\" style=\"max-width:1180px;margin:0 auto;padding:64px 56px 72px\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;letter-spacing:.12em;color:#5a5d64;margin-bottom:34px\">03 — PROJECTS<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid #d9d9d1;background:#fff\">\n      <div style=\"padding:24px;border-right:1px solid #d9d9d1\">\n        \n        <image-slot id=\"site-p1\" src=\"6c0995b7-1893-4763-8dd9-2fdbee973cbf\" style=\"width:100%;height:175px;display:block;border:1px solid #d9d9d1\" shape=\"rect\" placeholder=\"Project image\"><\u002Fimage-slot><div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;color:#2f6fed;margin:16px 0 8px\">CONTROLS<\u002Fdiv>\n        <div style=\"font-weight:700;font-size:18px;margin-bottom:7px\">Adaptive Flight Control<\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.55;color:#6b6d74;margin:0\">Adaptive augmentation for robust disturbance rejection on the morphable quadrotor.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:24px;border-right:1px solid #d9d9d1\">\n        <image-slot id=\"site-p2\" src=\"d5f90761-79d8-4dcf-8856-c2270df184be\" style=\"width:100%;height:175px;display:block;border:1px solid #d9d9d1\" shape=\"rect\" placeholder=\"Project image\"><\u002Fimage-slot>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;color:#2f6fed;margin:16px 0 8px\">PERCEPTION<\u002Fdiv>\n        <div style=\"font-weight:700;font-size:18px;margin-bottom:7px\">LiDAR–IMU SLAM<\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.55;color:#6b6d74;margin:0\">Real-time LiDAR/IMU SLAM on ROS2 for off-road vehicle navigation.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:24px;border-right:1px solid #d9d9d1\">\n        <image-slot id=\"site-p3\" src=\"02d44499-b8ad-4d7e-8074-aa9da7884043\" style=\"width:100%;height:175px;display:block;border:1px solid #d9d9d1\" shape=\"rect\" placeholder=\"Project image\"><\u002Fimage-slot>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;color:#2f6fed;margin:16px 0 8px\">SIMULATION<\u002Fdiv>\n        <div style=\"font-weight:700;font-size:18px;margin-bottom:7px\">Multi-Drone Mesh Sim<\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.55;color:#6b6d74;margin:0\">Physics simulator for a multi-drone mesh network with Ardupilot SITL.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:24px\">\n        <image-slot id=\"site-p4\" src=\"ab4a1b7d-51db-491e-9dd8-5ad82601f5ef\" style=\"width:100%;height:175px;display:block;border:1px solid #d9d9d1\" shape=\"rect\" placeholder=\"Project image\"><\u002Fimage-slot>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;color:#2f6fed;margin:16px 0 8px\">LEADERSHIP<\u002Fdiv>\n        <div style=\"font-weight:700;font-size:18px;margin-bottom:7px\">UMARV — Autonomous Vehicle<\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.55;color:#6b6d74;margin:0\">As Engineering Director, led the Navigation, Vision, Embedded, Platform &amp; Sensors subteams — growing the team from 5 to 80 members.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== FOOTER ===== -->\n  <div style=\"border-top:1px solid #d9d9d1;background:#14171c\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:44px 56px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px\">\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;color:#fff\">jose_diaz<span style=\"color:#6f9bff\">.dev<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:13.5px;color:#9a9da4;margin-top:8px\">PhD Researcher · Robotics &amp; Autonomy · University of Michigan<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:24px;font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#c4c6cc\">\n        <a onclick=\"{{ openEmail }}\" style=\"color:#c4c6cc;cursor:pointer\">{{ emailObf }}<\u002Fa>\n        <a href=\"https://scholar.google.com/citations?user=IFyPjEAAAAAJ&amp;hl=en\" target=\"_blank\" style=\"color:#c4c6cc\">Scholar<\u002Fa>\n        <a href=\"https://www.linkedin.com/in/jose-diaz-peon/\" target=\"_blank\" style=\"color:#c4c6cc\">LinkedIn<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    const user = 'diazjose';\n    const host = 'umich.edu';\n    return {\n      emailObf: user + ' [at] ' + host.replace('.', ' [dot] '),\n      openEmail: () => { window.location.href = 'mailto:' + user + '@' + host; }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
